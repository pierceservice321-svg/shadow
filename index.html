<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL | St. Maria's Orphanage</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Special+Elite&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: radial-gradient(circle, #1a0000 0%, #000 100%); 
            color: #900; font-family: "Noto Serif TC", serif; 
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; 
        }

        /* 掃描線濾鏡 */
        body::before {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100000; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        /* 初始前傳 */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 999; background: #000; padding: 20px;
        }
        #intro-text { 
            max-width: 600px; width: 90%; color: #c33; font-size: 1rem; line-height: 2.2; 
            text-shadow: 0 0 8px rgba(255,0,0,0.4); min-height: 350px; text-align: left;
            border-left: 2px solid #500; padding-left: 20px;
        }
        #intro-btn-container { display: flex; gap: 20px; margin-top: 40px; opacity: 0; visibility: hidden; transition: opacity 1.5s ease-in; }

        .btn { background: none; border: 1px solid #f00; color: #f00; padding: 12px 40px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; letter-spacing: 4px; font-weight: bold; }
        .btn:hover { background: #f00; color: #000; }

        /* 終端機容器 */
        .terminal-container { width: 90%; max-width: 400px; padding: 25px; display: none; flex-direction: column; border: 1px solid #800; background: rgba(10, 0, 0, 0.95); position: relative; }
        
        /* 強制置中的解密層 */
        #decrypt-overlay {
            display: none; 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 0, 0, 0.98); 
            z-index: 200; 
            flex-direction: column; 
            justify-content: center; /* 水平置中核心 */
            align-items: center;     /* 垂直置中核心 */
            text-align: center;      /* 文字內部置中 */
        }
        .decrypt-status { 
            width: 100%; 
            color: #f00; 
            font-family: monospace; 
            font-size: 0.9rem; 
            letter-spacing: 1px; 
            margin-bottom: 15px; 
            padding: 0 10px;
            animation: blink 0.5s infinite alternate; 
        }
        .progress-bar { width: 70%; height: 4px; background: #200; border-radius: 2px; overflow: hidden; margin: 0 auto; }
        .progress-fill { width: 0%; height: 100%; background: #f00; box-shadow: 0 0 10px #f00; }
        #decrypt-hex { width: 100%; font-family: monospace; font-size: 0.6rem; color: #500; margin-top: 15px; }

        #display { background: rgba(20, 0, 0, 0.6); border: 1px solid #500; color: #f00; height: 70px; line-height: 70px; text-align: center; font-size: 2rem; letter-spacing: 10px; margin: 20px 0; font-family: 'Special Elite', cursive; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .key { background: rgba(40, 0, 0, 0.3); border: 1px solid #600; color: #a55; padding: 18px 0; font-size: 1.3rem; cursor: pointer; }

        /* 報告書 */
        #secret-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; justify-content: center; align-items: center; padding: 10px; }
        .evidence-folder { 
            position: relative; width: 95%; max-width: 600px; padding: 30px 25px 80px 25px; color: #d22; 
            max-height: 85vh; overflow-y: auto; border: 1px solid #600; line-height: 1.7; background: #0a0000;
        }
        
        .bottom-stamp-area { position: relative; margin-top: 40px; width: 100%; text-align: right; }
        .stamp { display: inline-block; border: 2px solid #f00; color: #f00; font-family: 'Special Elite', cursive; font-size: 0.8rem; padding: 4px 10px; opacity: 0.5; font-weight: bold; transform: rotate(-10deg); margin-bottom: 5px; }

        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }
        #success-ending { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100001; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #death-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; overflow-y: auto; padding: 20px; }
        #flood-content { color: #f00; font-weight: bold; font-family: serif; font-size: 1.4rem; line-height: 1.4; word-break: break-all; }
    </style>
</head>
<body>

<div id="intro-screen">
    <div id="intro-text"></div>
    <div id="intro-btn-container">
        <button class="btn" onclick="startGame()">YES</button>
        <button class="btn btn" style="border-color:#444; color:#666;" onclick="triggerFloodTypewriter()">NO</button>
    </div>
</div>

<div class="terminal-container" id="main-terminal">
    <div id="decrypt-overlay">
        <div class="decrypt-status" id="decrypt-msg">LOADING...</div>
        <div class="progress-bar"><div class="progress-fill" id="p-fill"></div></div>
        <div id="decrypt-hex"></div>
    </div>

    <div style="text-align:center;">
        <p id="current-gate" style="color:#f00; font-size:0.9rem; font-weight:bold; letter-spacing:1px; margin-bottom:5px;">[ 驗證程序一 ]</p>
        <div id="glitch-code" style="font-family:monospace; color:#400; font-size:0.7rem;">SCANNING...</div>
    </div>
    <div id="display">-</div>
    <div class="keypad">
        <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button>
        <button class="key" onclick="press('4')">4</button><button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button>
        <button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button><button class="key" onclick="press('9')">9</button>
        <button class="key" style="color:#f00;" onclick="clearD()">CLR</button>
        <button class="key" onclick="press('0')">0</button>
        <button class="key" style="color:#f00;" onclick="submit()">EXE</button>
    </div>
</div>

<div id="secret-overlay">
    <div class="evidence-folder">
        <h2 style="font-size:1rem; text-align:center; margin-bottom:20px; color:#f00;">【機密：特殊個案追蹤報告】</h2>
        <div style="font-size:0.95rem; border-left:2px solid #500; padding-left:15px;">
            <strong>Luca Veil</strong><br>原生家族已於大火中喪生。<br><br>
            <strong>衝突：</strong>1月12日遭到圍堵，拼死保護金屬扣，導致關節受傷。<br><br>
            <strong>觀察：</strong>具備極端情感隔離能力，安靜得像在觀察標本。<br><br>
            <strong>事件：</strong>冷藏室受困四小時未求救，推測為合格實驗品。
        </div>
        <div class="bottom-stamp-area">
            <div class="stamp">TOP SECRET</div>
            <button onclick="triggerSuccessEnd()" style="width:100%; background:none; color:#f00; border:1px solid #f00; padding:15px; cursor:pointer; font-weight:bold;">抹除存取紀錄 (PURGE)</button>
        </div>
    </div>
</div>

<div id="success-ending">
    <div style="color:#f00; font-size:1.4rem; letter-spacing:3px;">你做得很好，現在快跑。</div>
</div>

<div id="death-screen"><div id="flood-content"></div></div>

<script>
    let currentMod = 1; let inputStr = ""; 
    const answers = { 1: "1", 2: "4", 3: "12" };
    const gateTitles = { 1: "[ 驗證程序一：身份殘留 ]", 2: "[ 驗證程序二：耐受測試 ]", 3: "[ 驗證程序三：捏造血緣 ]" };
    const decryptMsgs = { 1: "SECURITY LAYER 1: BREACHING...", 2: "DATA EXTRACTION IN PROGRESS...", 3: "CORE SYSTEM: CRACKING..." };
    const decryptTimes = { 1: 2000, 2: 5000, 3: 8500 }; 

    const introTextRaw = "2✕✕✕年的深夜，一場大火抹去了Veil家族的所有痕跡。\n縱然所有資料皆顯示無人生還，但有位被隱藏在灰燼中的孩子，學會了如何服從規則。\n他在2✕✕✕年✕✕月12號被迫接受了新的罪名，加入了不屬於他的家族。\n被抹去的記憶，那段在深處的冰庫裡反鎖了整整四個小時的秘密。\n\n你確定要進入地下室嗎？";

    function typeWriter(text, i, targetId, callback) {
        if (i < text.length) {
            let char = text.charAt(i);
            document.getElementById(targetId).innerHTML += (char === '\n' ? '<br>' : char);
            setTimeout(() => typeWriter(text, i + 1, targetId, callback), (char === '，' || char === '。' || char === '\n' ? 550 : 50));
        } else if (callback) callback();
    }

    window.onload = () => { typeWriter(introTextRaw, 0, 'intro-text', () => { document.getElementById('intro-btn-container').style.visibility = "visible"; document.getElementById('intro-btn-container').style.opacity = "1"; }); };
    function startGame() { document.getElementById('intro-screen').style.display = 'none'; document.getElementById('main-terminal').style.display = 'flex'; }
    function press(n) { let max = (currentMod === 3) ? 2 : 1; if (inputStr.length < max) { inputStr += n; document.getElementById('display').innerText = inputStr; } }
    function clearD() { inputStr = ""; document.getElementById('display').innerText = (currentMod === 3) ? "--" : "-"; }
    
    function submit() {
        if (inputStr === answers[currentMod]) {
            const overlay = document.getElementById('decrypt-overlay');
            const fill = document.getElementById('p-fill');
            const msg = document.getElementById('decrypt-msg');
            const duration = decryptTimes[currentMod];
            overlay.style.display = 'flex';
            msg.innerText = decryptMsgs[currentMod];
            let start = null;
            const step = (timestamp) => {
                if (!start) start = timestamp;
                const elapsed = timestamp - start;
                fill.style.width = Math.min((elapsed / duration) * 100, 100) + "%";
                if (elapsed < duration) { requestAnimationFrame(step); } else {
                    setTimeout(() => {
                        overlay.style.display = 'none'; fill.style.width = "0%";
                        if (currentMod < 3) { currentMod++; document.getElementById('current-gate').innerText = gateTitles[currentMod]; clearD(); } 
                        else { document.getElementById('main-terminal').style.display = 'none'; document.getElementById('secret-overlay').style.display = 'flex'; }
                    }, 400);
                }
            };
            requestAnimationFrame(step);
        } else { document.getElementById('display').innerText = "ERROR"; setTimeout(clearD, 500); }
    }

    function triggerSuccessEnd() { document.getElementById('secret-overlay').style.display = 'none'; document.getElementById('success-ending').style.display = 'flex'; }
    function triggerFloodTypewriter() { document.getElementById('death-screen').style.display = "block"; startTypingRun(); }
    function startTypingRun() { document.getElementById('flood-content').innerHTML += "RUN "; document.getElementById('death-screen').scrollTop = document.getElementById('death-screen').scrollHeight; setTimeout(startTypingRun, 10); }
</script>
</body>
</html>
