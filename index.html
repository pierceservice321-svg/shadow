<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL | St. Maria's Orphanage</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Special+Elite&family=Cormorant+Unicase:wght@700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #900; font-family: "Noto Serif TC", serif; margin: 0; padding: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        #bg-glitch { position: fixed; inset: 0; font-family: monospace; font-size: 11px; color: rgba(180, 0, 0, 0.12); pointer-events: none; white-space: pre-wrap; overflow: hidden; z-index: 1; }

        /* 前傳介面 */
        #intro-screen { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; background: #000; padding: 25px; }
        #intro-text { max-width: 600px; width: 95%; color: #c33; font-size: 1.05rem; line-height: 2.2; min-height: 380px; border-left: 2px solid #600; padding-left: 20px; }
        #intro-btn-container { display: flex; gap: 20px; margin-top: 40px; opacity: 0; visibility: hidden; transition: opacity 1.5s; }
        .btn { background: none; border: 1px solid #f00; color: #f00; padding: 12px 40px; font-size: 1.1rem; cursor: pointer; letter-spacing: 4px; font-weight: bold; }

        /* 終端機介面 */
        .terminal-container { width: 92%; max-width: 420px; padding: 30px; display: none; flex-direction: column; border: 1px solid #800; background: rgba(12, 0, 0, 0.98); z-index: 10; position: relative; }
        .header-wrapper { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-family: 'Special Elite'; color: #f00; }
        .noise { font-size: 0.85rem; color: #700; opacity: 0.7; animation: blink 0.1s infinite; }
        #display { background: rgba(40, 0, 0, 0.8); border: 1px solid #700; color: #f00; height: 80px; line-height: 80px; text-align: center; font-size: 2.6rem; margin-bottom: 25px; font-family: 'Special Elite'; box-shadow: inset 0 0 20px #600; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .key { background: rgba(60, 0, 0, 0.4); border: 1px solid #900; color: #c77; padding: 22px 0; font-size: 1.6rem; cursor: pointer; }

        /* --- 核心恐怖崩潰層 --- */
        #flood-screen { 
            display: none; position: fixed; inset: 0; background: #000; z-index: 200000; overflow: hidden; 
            animation: screenShake 0.05s infinite; 
        }
        #flood-content { 
            font-family: 'Cormorant Unicase', serif; line-height: 0.5; position: absolute; width: 120%; left: -10%; 
            mix-blend-mode: screen; 
        }

        /* 0.15s 極速閃爍泛白動畫 */
        @keyframes strobeDeath {
            0% { color: #f00; background: transparent; filter: brightness(1) blur(0px); }
            15% { color: #fff; background: #fff; filter: brightness(5) blur(2px); } /* 瞬間全螢幕泛白感 */
            30% { color: #000; background: transparent; filter: brightness(0.2); }
            45% { color: #fff; filter: contrast(2) brightness(3); }
            60% { color: #800; filter: blur(1px); }
            100% { color: #f00; filter: brightness(1); }
        }

        @keyframes screenShake {
            0% { transform: translate(0,0); }
            25% { transform: translate(2px, -2px); }
            50% { transform: translate(-2px, 2px); }
            75% { transform: translate(1px, 1px); }
            100% { transform: translate(0,0); }
        }

        .glitch-item { 
            display: inline-block; 
            animation: strobeDeath 0.18s infinite steps(1); 
            text-shadow: 2px 2px 10px #f00;
        }

        #secret-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; justify-content: center; align-items: center; padding: 20px; }
        .evidence-folder { width: 100%; max-width: 600px; color: #d33; border: 1px solid #800; padding: 35px; background: #0d0000; line-height: 1.8; overflow-y: auto; max-height: 90vh; }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>

<div id="bg-glitch"></div>

<div id="intro-screen">
    <div id="intro-text"></div>
    <div id="intro-btn-container">
        <button class="btn" onclick="startGame()">YES</button>
        <button class="btn" style="border-color:#333; color:#555;" onclick="triggerFlood('NO')">NO</button>
    </div>
</div>

<div class="terminal-container" id="main-terminal">
    <div class="header-wrapper">
        <div class="noise" id="l-noise">F8_x1</div>
        <div id="gate-title">STAGE 01: 生還者</div>
        <div class="noise" id="r-noise">K9#pL</div>
    </div>
    <div id="display">-</div>
    <div class="keypad">
        <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button>
        <button class="key" onclick="press('4')">4</button><button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button>
        <button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button><button class="key" onclick="press('9')">9</button>
        <button class="key" style="color:#f00;" onclick="clearD()">CLR</button>
        <button class="key" onclick="press('0')">0</button>
        <button class="key" style="color:#f00;" onclick="submit()">EXE</button>
    </div>
</div>

<div id="secret-overlay">
    <div class="evidence-folder">
        <h3 style="color:#f00; font-family:'Special Elite'; border-bottom:1px solid #500; text-align:center;">CLASSIFIED: CASE #0412</h3>
        <p><b>【特殊個案追蹤報告】</b><br>受測者：Luca Veil</p>
        <p>1月12日衝突：受測者遭到五名兒童圍堵。對方試圖奪取其領口刻有「V」字樣的金屬扣。受測者全程未發出尖叫，導致雙手指關節✕✕。</p>
        <p>冷藏室事件：在食品冷藏室受困四小時。值班人員打開門時，他全身凍得發紫，卻仍死死握著金屬扣。</p>
        <p style="font-style:italic; color:#944; border-top:1px dashed #600; padding-top:10px;">「他像是觀察某種即將腐爛的標本。」</p>
        <button onclick="location.reload()" style="width:100%; background:#f00; border:none; padding:15px; margin-top:20px; font-weight:bold; cursor:pointer;">PURGE & EXIT</button>
    </div>
</div>

<div id="flood-screen"><div id="flood-content"></div></div>

<script>
    "use strict";
    let currentStage = 1;
    let inputStr = "";
    let errorCount = 0;
    const answers = { 1: "1", 2: "4", 3: "12" };
    const stageTitles = { 1: "STAGE 01: 生還者", 2: "STAGE 02: 耐受測試", 3: "STAGE 03: 捏造血緣" };
    
    const introTextRaw = "2✕✕✕年的深夜，一場大火抹去了Veil家族的所有痕跡。\n縱然所有資料皆顯示無人生還，但有位被隱藏在灰燼中的孩子，學會了如何服從規則。\n他在2✕✕✕年✕✕月12號被迫接受了新的罪名，加入了不屬於他的家族。\n被抹去的記憶，那段在深處的冰庫裡反鎖了整整四個小時的秘密。\n\n你確定要嘗試打開地下室的保險箱嗎？";
    
    const crashWords = ["DEAD", "VOID", "✕✕✕", "RUN", "HELP", "HE IS HERE", "Ø", "∑", "†"];

    function getRandChar(len) {
        const chars = "ABCDEF0123456789!@#$%^&*()_+-=[]{}|;:,.<>?/✕ø∑†‡";
        let res = "";
        for(let i=0; i<len; i++) res += chars[Math.floor(Math.random()*chars.length)];
        return res;
    }

    function startNoiseSystem() {
        const bg = document.getElementById('bg-glitch');
        setInterval(() => { if (Math.random() > 0.5) bg.innerText = getRandChar(700); }, 100);
        setInterval(() => {
            document.getElementById('l-noise').innerText = getRandChar(5);
            document.getElementById('r-noise').innerText = getRandChar(5);
        }, 60);
    }

    function typeWriter(text, i, targetId, callback) {
        if (i < text.length) {
            document.getElementById(targetId).innerHTML += (text[i] === '\n' ? '<br>' : text[i]);
            let speed = (text[i] === '。' || text[i] === '？' || text[i] === '\n') ? 400 : 45;
            setTimeout(() => typeWriter(text, i + 1, targetId, callback), speed);
        } else if (callback) callback();
    }

    window.onload = () => { 
        startNoiseSystem();
        typeWriter(introTextRaw, 0, 'intro-text', () => { 
            document.getElementById('intro-btn-container').style.visibility = "visible"; 
            document.getElementById('intro-btn-container').style.opacity = "1"; 
        }); 
    };

    function startGame() { document.getElementById('intro-screen').style.display = 'none'; document.getElementById('main-terminal').style.display = 'flex'; }
    function press(n) { if (inputStr.length < (currentStage === 3 ? 2 : 1)) { inputStr += n; document.getElementById('display').innerText = inputStr; } }
    function clearD() { inputStr = ""; document.getElementById('display').innerText = "-"; }
    
    function submit() {
        if (inputStr === answers[currentStage]) { 
            if (currentStage < 3) { 
                currentStage++; clearD(); 
                document.getElementById('gate-title').innerText = stageTitles[currentStage];
            } else { 
                document.getElementById('main-terminal').style.display = 'none';
                document.getElementById('secret-overlay').style.display = 'flex';
            }
        } else { 
            errorCount++; 
            if (errorCount >= 3) { triggerFlood('DEAD'); } 
            else { document.getElementById('display').innerText = "ERR"; setTimeout(clearD, 600); }
        }
    }

    function triggerFlood(type) {
        document.getElementById('main-terminal').style.display = 'none';
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('flood-screen').style.display = "block";
        const content = document.getElementById('flood-content');
        
        setTimeout(() => { window.location.reload(); }, 8000);

        setInterval(() => { 
            const word = crashWords[Math.floor(Math.random() * crashWords.length)];
            const fontSize = Math.floor(Math.random() * 65 + 10) + "px";
            const rotation = Math.random() * 20 - 10;
            const noise = getRandChar(Math.random() * 4);
            
            content.innerHTML += `<span class="glitch-item" style="
                font-size:${fontSize}; 
                margin-right:15px; 
                transform:rotate(${rotation}deg) scale(${Math.random() + 0.5});
                opacity: ${Math.random() + 0.3};
            ">${word}${noise}</span> `; 
            
            window.scrollTo(0, document.body.scrollHeight);
        }, 12);
    }
</script>
</body>
</html>
