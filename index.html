<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL | St. Maria's Orphanage</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Special+Elite&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: radial-gradient(circle, #1a0000 0%, #000 100%); 
            color: #900; font-family: "Noto Serif TC", serif; 
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; 
        }

        /* 全局掃描線特效 */
        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100000; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        /* 介面外框發光 */
        .terminal-container, .evidence-folder {
            border: 1px solid #800;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.2), inset 0 0 10px rgba(139, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            background: rgba(10, 0, 0, 0.95);
        }

        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; padding: 20px; text-align: center;
        }
        
        #intro-text { max-width: 90%; color: #c33; font-size: 1.05rem; line-height: 2; text-shadow: 0 0 8px rgba(255,0,0,0.4); }
        
        .btn { 
            background: none; border: 1px solid #f00; color: #f00; 
            padding: 12px 35px; font-size: 1.1rem; cursor: pointer; 
            transition: all 0.2s; letter-spacing: 4px; position: relative; overflow: hidden;
        }
        .btn:hover { background: #f00; color: #000; box-shadow: 0 0 15px #f00; }

        .terminal-container { 
            width: 95%; max-width: 420px; padding: 30px; display: none; flex-direction: column; 
        }

        #display { 
            background: rgba(20, 0, 0, 0.5); border: 1px solid #500; color: #f00; height: 70px; line-height: 70px; 
            text-align: center; font-size: 2.2rem; letter-spacing: 12px; margin-bottom: 25px;
            text-shadow: 0 0 15px #f00; font-family: 'Special Elite', cursive;
        }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .key { 
            background: rgba(30, 0, 0, 0.4); border: 1px solid #400; color: #a55; 
            padding: 18px 0; font-size: 1.4rem; cursor: pointer; transition: 0.1s;
        }
        .key:active { transform: scale(0.95); background: #800; color: #fff; }

        /* 秘密報告 - 打字機排版 */
        #secret-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; padding: 15px; 
        }
        .evidence-folder { 
            width: 100%; max-width: 480px; padding: 40px; color: #d22; 
            max-height: 85vh; overflow-y: auto; border-top: 5px solid #a00;
        }
        .report-content { font-family: "Courier New", Courier, monospace; }
        
        .bottom-stamp { 
            border: 4px double #f00; color: #f00; padding: 8px 20px; font-weight: bold; 
            display: inline-block; transform: rotate(-12deg); opacity: 0.8;
            font-size: 1.2rem; margin-top: 20px;
        }

        /* 打字機動畫 */
        .typing { overflow: hidden; border-right: .15em solid orange; white-space: nowrap; animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite; }

        #ending-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 10001; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="intro-screen">
    <div id="intro-text" style="text-align: left; border-left: 2px solid #500; padding-left: 20px;">
        2✕✕✕年的深夜，一場大火抹去了Veil家族的所有痕跡。<br>
        縱然所有資料都顯示無人生還，<br>
        但那活下來的孩子，學會了服從規則。<br>
        他在2✕✕✕年✕✕月12號被迫接受了新的姓氏。加入了不屬於他的家族。<br>
        被抹去的記憶，那段在深處的冰庫裡反鎖了整整四個小時的秘密。<br><br>
        <span style="color: #f00; letter-spacing: 2px;">你確定要進入地下室嗎？</span>
    </div>
    <div class="choice-container" id="choices" style="margin-top:30px;">
        <button class="btn" onclick="startGame()">存取</button>
        <button class="btn" style="border-color:#333; color:#444;" onclick="triggerDeath('exit')">撤退</button>
    </div>
</div>

<div class="terminal-container" id="main-terminal">
    <div style="font-size:0.65rem; color:#600; text-align:center; margin-bottom:15px; letter-spacing:3px; opacity:0.7;">DATA ENCRYPTION STANDARD // LEVEL 04</div>
    <div style="text-align:center; margin-bottom:20px;">
        <p id="current-gate" style="color:#f00; letter-spacing:2px; font-size:1rem; margin:0;">[ 驗證程序一：身份殘留 ]</p>
        <div style="width: 100%; height: 1px; background: linear-gradient(90deg, transparent, #800, transparent); margin: 10px 0;"></div>
        <p style="color:#500; font-size:0.7rem;">STATUS: ENCRYPTED_DATA_SECTOR</p>
    </div>
    <div id="display">-</div>
    <div class="keypad">
        <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button>
        <button class="key" onclick="press('4')">4</button><button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button>
        <button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button><button class="key" onclick="press('9')">9</button>
        <button class="key" style="color:#f00;" onclick="clearD()">CLR</button>
        <button class="key" onclick="press('0')">0</button>
        <button class="key" style="color:#f00;" onclick="submit()">EXE</button>
    </div>
    <div id="status-msg" style="margin-top:20px; color:#500; text-align:center; font-family:monospace; font-size:0.8rem;">READY_</div>
</div>

<div id="secret-overlay">
    <div class="evidence-folder" id="report-box">
        </div>
</div>

<div id="ending-screen">
    <div class="fade-in-text" style="color:#f00; font-size:1.4rem; letter-spacing:2px; font-style:italic;">你做得很好，但快躲起來吧。</div>
    <p style="color: #300; font-size: 0.7rem; margin-top: 40px; letter-spacing: 5px;">RECORDS_PURGED</p>
</div>

<script>
    let currentMod = 1; let inputStr = ""; let failCount = 0;
    const answers = { 1: "1", 2: "4", 3: "12" };
    const gates = { 1: "[ 驗證程序一：身份殘留 ]", 2: "[ 驗證程序二：耐受體質 ]", 3: "[ 驗證程序三：捏造血緣 ]" };

    const reportText = `【聖瑪利亞孤兒院 特殊個案追蹤報告】\n\n受測者：Luca\n姓氏：Veil（原生家族已於2004年火災中全員喪生）\n\n衝突紀錄：1月12日，受測者遭到院內其餘五名年較為長兒童圍堵。對方試圖割開其衣領奪取一枚刻有「V」字樣的殘破金屬扣。受測者全程未發出尖叫或求饒，僅以雙手死死護住目標物。\n\n語言霸凌觀測：院內兒童頻繁以「異類」、「雜種」等詞彙進行排擠。受測者表現出極強的情感隔離，他安靜地坐在角落，用那雙上揚的鳳眸注視著霸凌者，彷彿在觀察某種即將腐爛的標本。\n\n冷藏室事件：為了測試其耐受極限，他在4月的一個深夜被關入食品冷藏室。四小時後，當值班人員打開門時，他全身凍得發紫，卻仍緊握著那枚金屬扣。看見光線時，他從未試圖求救。\n\n這一切似乎是有人在背後刻意指導，想測驗他是否為一位合格的實驗品。`;

    function startGame() {
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('main-terminal').style.display = 'flex';
        updateHint();
    }

    function typeWriter(text, i, fnCallback) {
        if (i < text.length) {
            document.getElementById("report-box").innerHTML = text.substring(0, i+1) +'<span aria-hidden="true"></span>';
            setTimeout(function() { typeWriter(text, i + 1, fnCallback) }, 30);
        } else {
            document.getElementById("report-box").innerHTML += `<br><div style="text-align:right"><div class="bottom-stamp">TOP SECRET</div></div><button onclick="triggerEnd()" style="width:100%; background:#400; color:#f00; border:1px solid #f00; padding:15px; margin-top:30px; cursor:pointer; font-weight:bold;">抹除存取紀錄</button>`;
        }
    }

    function triggerEnd() {
        document.getElementById('secret-overlay').style.display = 'none';
        document.getElementById('ending-screen').style.display = 'flex';
    }

    function triggerDeath(reason) {
        document.body.style.animation = "dead-shake 0.1s infinite";
        document.body.innerHTML = `<div style="color:#f00; font-size:3rem; font-weight:bold; letter-spacing:10px;">TERMINATED</div>`;
        setTimeout(() => { location.reload(); }, 3000);
    }

    function updateHint() {
        document.getElementById('display').innerText = (currentMod === 3) ? "--" : "-";
        inputStr = "";
    }

    function press(n) {
        let max = (currentMod === 3) ? 2 : 1;
        if (inputStr.length < max) {
            inputStr += n; document.getElementById('display').innerText = inputStr;
        }
    }

    function clearD() { updateHint(); }

    function submit() {
        if (inputStr === "") return;
        const status = document.getElementById('status-msg');
        status.innerText = "VERIFYING...";
        setTimeout(() => {
            if (inputStr === answers[currentMod]) {
                if (currentMod < 3) {
                    currentMod++;
                    document.getElementById('current-gate').innerText = gates[currentMod];
                    status.innerText = "SUCCESS.";
                    updateHint();
                } else {
                    document.getElementById('main-terminal').style.display = 'none';
                    document.getElementById('secret-overlay').style.display = 'flex';
                    typeWriter(reportText, 0);
                }
            } else {
                failCount++;
                status.innerText = "DENIED. ATTEMPT " + failCount + "/5";
                if (failCount >= 5) triggerDeath();
                updateHint();
            }
        }, 600);
    }
</script>
</body>
</html>
