<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL | St. Maria's Orphanage</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Special+Elite&family=Cormorant+Unicase:wght@700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #900; font-family: "Noto Serif TC", serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; position: relative; }

        /* 前傳樣式 */
        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; background: #000; padding: 20px; }
        #intro-text { max-width: 600px; width: 90%; color: #c33; font-size: 1.05rem; line-height: 2.2; min-height: 350px; text-align: left; border-left: 2px solid #500; padding-left: 20px; text-shadow: 0 0 8px rgba(255,0,0,0.3); }
        #intro-btn-container { display: flex; gap: 20px; margin-top: 40px; opacity: 0; visibility: hidden; transition: opacity 1.5s ease-in; }
        .btn { background: none; border: 1px solid #f00; color: #f00; padding: 12px 40px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; letter-spacing: 4px; font-weight: bold; outline: none; }
        .btn:hover { background: #f00; color: #000; }

        /* 終端機介面 */
        .terminal-container { width: 92%; max-width: 400px; padding: 30px; display: none; flex-direction: column; border: 1px solid #800; background: rgba(10, 0, 0, 0.95); position: relative; z-index: 10; }
        #display { background: rgba(20, 0, 0, 0.6); border: 1px solid #500; color: #f00; height: 75px; line-height: 75px; text-align: center; font-size: 2.2rem; margin-bottom: 20px; font-family: 'Special Elite', cursive; box-shadow: inset 0 0 20px #400;}
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .key { background: rgba(40, 0, 0, 0.3); border: 1px solid #600; color: #a55; padding: 20px 0; font-size: 1.4rem; cursor: pointer; outline: none; }

        /* --- 核心崩潰特效 (DEAD & NO 共用) --- */
        #flood-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200000; overflow: hidden; filter: contrast(1.5) brightness(1.2); }
        #flood-content { font-family: 'Cormorant Unicase', serif; word-break: break-all; line-height: 0.7; position: absolute; width: 110%; height: 110%; top: -5%; left: -5%; }

        /* 極速閃爍與泛白動畫 */
        @keyframes fastGlitch {
            0% { color: #f00; text-shadow: 0 0 0px #fff; opacity: 1; }
            20% { color: #fff; text-shadow: 0 0 15px #fff; opacity: 0.8; filter: blur(1px); } /* 泛白閃爍 */
            40% { color: #800; text-shadow: none; opacity: 1; }
            60% { color: #fff; text-shadow: 0 0 20px #fff; filter: brightness(2); } /* 強烈泛白 */
            80% { color: #f00; text-shadow: 0 0 5px #f00; }
            100% { color: #ff0000; }
        }

        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="intro-screen">
    <div id="intro-text"></div>
    <div id="intro-btn-container">
        <button class="btn" onclick="startGame()">YES</button>
        <button class="btn" style="border-color:#444; color:#666;" onclick="triggerFlood('NO')">NO</button>
    </div>
</div>

<div class="terminal-container" id="main-terminal">
    <div style="text-align:center; margin-bottom:15px; font-family:'Special Elite'; color:#f00; border:1px solid #700; padding:5px;">STAGE 01: 生還者</div>
    <div id="display">-</div>
    <div class="keypad">
        <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button>
        <button class="key" onclick="press('4')">4</button><button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button>
        <button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button><button class="key" onclick="press('9')">9</button>
        <button class="key" style="color:#f00;" onclick="clearD()">CLR</button>
        <button class="key" onclick="press('0')">0</button>
        <button class="key" style="color:#f00;" onclick="submit()">EXE</button>
    </div>
</div>

<div id="flood-screen"><div id="flood-content"></div></div>

<script>
    "use strict";
    let currentMod = 1; 
    let inputStr = ""; 
    let errorCount = 0; 
    let activeInterval; 
    const answers = { 1: "1", 2: "4", 3: "12" };
    
    const introTextRaw = "2✕✕✕年的深夜，一場大火抹去了Veil家族的所有痕跡。\n縱然所有資料皆顯示無人生還，但有位被隱藏在灰燼中的孩子，學會了如何服從規則。\n\n你確定要嘗試打開地下室的保險箱嗎？";
    const runWords = ["RUN", "WATCH OUT", "HE IS HERE", "HIDE", "TOO LATE", "✕✕✕"];

    function typeWriter(text, i, targetId, callback) {
        if (i < text.length) {
            document.getElementById(targetId).innerHTML += (text[i] === '\n' ? '<br>' : text[i]);
            setTimeout(() => typeWriter(text, i + 1, targetId, callback), 50);
        } else if (callback) callback();
    }

    window.onload = () => { 
        typeWriter(introTextRaw, 0, 'intro-text', () => { 
            document.getElementById('intro-btn-container').style.visibility = "visible"; 
            document.getElementById('intro-btn-container').style.opacity = "1"; 
        }); 
    };

    function startGame() { document.getElementById('intro-screen').style.display = 'none'; document.getElementById('main-terminal').style.display = 'flex'; }
    function press(n) { if (inputStr.length < (currentMod === 3 ? 2 : 1)) { inputStr += n; document.getElementById('display').innerText = inputStr; } }
    function clearD() { inputStr = ""; document.getElementById('display').innerText = "-"; }
    
    function submit() {
        if (inputStr === answers[currentMod]) { 
            if (currentMod < 3) { currentMod++; clearD(); } 
            else { alert("ACCESS GRANTED"); } // 這裡可接成功頁面
        } else { 
            errorCount++; 
            if (errorCount >= 3) { triggerFlood('DEAD'); } 
            else { document.getElementById('display').innerText = "ERR"; setTimeout(clearD, 600); }
        }
    }

    // --- 整合版極速崩潰函式 (處理 NO 與 DEAD) ---
    function triggerFlood(type) {
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('main-terminal').style.display = 'none';
        document.getElementById('flood-screen').style.display = "block";
        const content = document.getElementById('flood-content');
        
        // 1. 強制 8 秒後重新導向 (8000ms)
        setTimeout(() => {
            clearInterval(activeInterval);
            window.location.href = window.location.href; 
        }, 8000);

        // 2. 極速產生洪水文字
        activeInterval = setInterval(() => { 
            const word = (type === 'DEAD') ? 'DEAD' : runWords[Math.floor(Math.random() * runWords.length)];
            const fontSize = Math.floor(Math.random() * 55 + 15) + "px";
            const scaleX = Math.random() * 2.5 + 0.5;
            const skew = Math.random() * 20 - 10 + "deg";
            
            // 動畫時間縮短到 0.1s - 0.3s 營造極速感
            const animDur = Math.random() * 0.2 + 0.1 + "s";
            
            content.innerHTML += `<span style="
                display:inline-block; 
                font-size:${fontSize}; 
                transform:scaleX(${scaleX}) skewX(${skew}); 
                animation:fastGlitch ${animDur} infinite alternate; 
                margin-right:8px;
                letter-spacing: -2px;
            ">${word}</span> `; 
            
            window.scrollTo(0, document.body.scrollHeight);
        }, 10); // 頻率提高到 10ms，噴發感極強
    }
</script>
</body>
</html>
