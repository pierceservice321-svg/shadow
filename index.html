<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL | St. Maria's Orphanage</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Special+Elite&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; color: #900; font-family: "Noto Serif TC", serif; 
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* 前傳樣式 */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 999; background: #000; padding: 20px;
        }
        #intro-text { 
            max-width: 600px; width: 90%; color: #c33; font-size: 1.05rem; line-height: 2.2; 
            min-height: 350px; text-align: left; border-left: 2px solid #500; padding-left: 20px;
        }
        #intro-btn-container { display: flex; gap: 20px; margin-top: 40px; opacity: 0; visibility: hidden; transition: opacity 1.5s ease-in; }
        .btn { background: none; border: 1px solid #f00; color: #f00; padding: 12px 40px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; letter-spacing: 4px; font-weight: bold; outline: none; }
        .btn:hover { background: #f00; color: #000; }

        /* 終端機容器 */
        .terminal-container { 
            width: 92%; max-width: 400px; padding: 30px; display: none; flex-direction: column; 
            border: 1px solid #800; background: rgba(10, 0, 0, 0.95); position: relative; z-index: 10; 
        }
        
        /* 解密動畫層 */
        #decrypt-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0000; z-index: 50; flex-direction: column; justify-content: center; align-items: center;
        }
        .decrypt-status { color: #f00; font-family: monospace; font-size: 0.9rem; margin-bottom: 20px; animation: blink 0.5s infinite alternate; }
        .progress-bar { width: 75%; height: 4px; background: #200; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #f00; transition: width 0.1s linear; }

        /* 介面細節 */
        #current-gate-title { color: #f00; font-weight: bold; letter-spacing: 2px; margin-bottom: 15px; font-size: 1.1rem; font-family: 'Special Elite', cursive; border: 1px solid #700; padding: 8px 15px; background: rgba(60, 0, 0, 0.2); }
        #glitch-display { color: #b00; font-size: 0.75rem; line-height: 1.4; min-height: 4.5em; font-family: monospace; word-break: break-all; opacity: 0.8; }
        #display { background: rgba(20, 0, 0, 0.6); border: 1px solid #500; color: #f00; height: 75px; line-height: 75px; text-align: center; font-size: 2.2rem; margin-bottom: 20px; font-family: 'Special Elite', cursive; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .key { background: rgba(40, 0, 0, 0.3); border: 1px solid #600; color: #a55; padding: 20px 0; font-size: 1.4rem; cursor: pointer; outline: none; }

        /* 報告書 */
        #secret-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; justify-content: center; align-items: center; padding: 15px; }
        .evidence-folder { width: 95%; max-width: 620px; padding: 40px 30px; color: #d22; background: #0a0000; border: 1px solid #600; line-height: 1.8; overflow-y: auto; max-height: 90vh; }
        .report-label { color: #f00; font-weight: bold; display: block; margin-bottom: 4px; border-left: 3px solid #f00; padding-left: 8px; }

        /* 結局 */
        #success-ending { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10001; flex-direction: column; justify-content: center; align-items: center; }
        .fear-text-sub { color: #fff; font-family: 'Special Elite', cursive; font-size: 2.2rem; letter-spacing: 12px; font-weight: bold; }

        /* 洪水模式 (NO鍵) */
        #no-death-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; overflow: hidden; }
        #flood-content { color: #f00; font-family: 'Special Elite', cursive; word-break: break-all; }

        /* 死亡結局 (DEAD) */
        #death-ending { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 200000; overflow: hidden; padding: 5px;
        }
        #death-content { color: #f00; font-family: 'Special Elite', cursive; word-break: break-all; line-height: 1.1; }

        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="intro-screen">
    <div id="intro-text"></div>
    <div id="intro-btn-container">
        <button class="btn" onclick="startGame()">YES</button>
        <button class="btn" style="border-color:#444; color:#666;" onclick="triggerFloodTypewriter()">NO</button>
    </div>
</div>

<div class="terminal-container" id="main-terminal">
    <div id="decrypt-overlay">
        <div class="decrypt-status" id="decrypt-msg">INITIALIZING...</div>
        <div class="progress-bar"><div class="progress-fill" id="p-fill"></div></div>
    </div>
    <div class="gate-info">
        <div id="current-gate-title">STAGE 01: 生還者</div>
        <div id="glitch-display"></div>
    </div>
    <div id="display">-</div>
    <div class="keypad">
        <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button>
        <button class="key" onclick="press('4')">4</button><button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button>
        <button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button><button class="key" onclick="press('9')">9</button>
        <button class="key" style="color:#f00;" onclick="clearD()">CLR</button>
        <button class="key" onclick="press('0')">0</button>
        <button class="key" style="color:#f00;" onclick="submit()">EXE</button>
    </div>
</div>

<div id="secret-overlay">
    <div class="evidence-folder">
        <h2 style="text-align:center; color:#f00;">CLASSIFIED REPORT</h2>
        <div class="report-paragraph"><span class="report-label">受測者：</span>Luca Veil (原生家族已於2004年喪生)</div>
        <div class="report-paragraph"><span class="report-label">衝突紀錄：</span>1月12日遭到圍堵，雙手護住「V」字金屬扣導致關節✕✕。</div>
        <div class="report-paragraph"><span class="report-label">語言霸凌觀測：</span>被譏諷為「雜種」，受測者表現出極度情感隔離，以綠眸注視霸凌者。</div>
        <div class="report-paragraph"><span class="report-label">冷藏室事件：</span>深夜被關入食品冷藏室四小時，全身凍紫仍未求救。</div>
        <div style="margin-top:40px;">
            <button onclick="triggerSuccessEnd()" style="width:100%; background:#f00; color:#000; border:none; padding:18px; cursor:pointer; font-weight:bold; letter-spacing:5px;">PURGE RECORDS</button>
        </div>
    </div>
</div>

<div id="success-ending">
    <div class="fear-text-sub">YOU DID WELL. NOW, RUN.</div>
</div>

<div id="no-death-screen"><div id="flood-content"></div></div>
<div id="death-ending"><div id="death-content"></div></div>

<script>
    "use strict";
    let currentMod = 1; 
    let inputStr = ""; 
    let errorCount = 0; 
    let glitchInterval;

    const gateTitles = { 1: "STAGE 01: 生還者", 2: "STAGE 02: 耐受測試", 3: "STAGE 03: 捏造血緣" };
    const answers = { 1: "1", 2: "4", 3: "12" };
    const warnings = ["RUN", "HURRY UP", "LOOK BEHIND YOU", "HIDE", "WATCH OUT", "HE IS COMING", "TOO LATE"];
    const introTextRaw = "2✕✕✕年的深夜，一場大火抹去了Veil家族的所有痕跡。\n縱然所有資料皆顯示無人生還，但有位被隱藏在灰燼中的孩子，學會了如何服從規則。\n他在2✕✕✕年✕✕月12號被迫接受了新的罪名，加入了不屬於他的家族。\n被抹去的記憶，那段在深處的冰庫裡反鎖了整整四個小時的秘密。\n\n你確定要嘗試打開地下室的保險箱嗎？";

    function typeWriter(text, i, targetId, callback) {
        if (i < text.length) {
            let char = text.charAt(i);
            document.getElementById(targetId).innerHTML += (char === '\n' ? '<br>' : char);
            setTimeout(() => typeWriter(text, i + 1, targetId, callback), (char === '？' || char === '。' || char === '\n' ? 550 : 50));
        } else if (callback) callback();
    }

    window.onload = () => { 
        typeWriter(introTextRaw, 0, 'intro-text', () => { 
            document.getElementById('intro-btn-container').style.visibility = "visible"; 
            document.getElementById('intro-btn-container').style.opacity = "1"; 
        }); 
    };

    function startGlitchEffect() {
        const target = document.getElementById('glitch-display');
        clearInterval(glitchInterval);
        glitchInterval = setInterval(() => {
            let glitched = "";
            for(let i=0; i<150; i++) { glitched += String.fromCharCode(33 + Math.random() * 94); }
            target.innerText = glitched;
        }, 50);
    }

    function startGame() { document.getElementById('intro-screen').style.display = 'none'; document.getElementById('main-terminal').style.display = 'flex'; startGlitchEffect(); }
    function press(n) { if (inputStr.length < (currentMod === 3 ? 2 : 1)) { inputStr += n; document.getElementById('display').innerText = inputStr; } }
    function clearD() { inputStr = ""; document.getElementById('display').innerText = "-"; }
    
    function submit() {
        if (inputStr === answers[currentMod]) { runDecryption(); } 
        else { 
            errorCount++; 
            if (errorCount >= 3) { triggerDeathEnding(); } // 核心修正：觸發死亡
            else { document.getElementById('display').innerText = "ERR"; setTimeout(clearD, 600); }
        }
    }

    function runDecryption() {
        const overlay = document.getElementById('decrypt-overlay');
        const fill = document.getElementById('p-fill');
        const duration = [0, 1500, 3000, 5000][currentMod];
        overlay.style.display = 'flex';
        let startTime = performance.now();
        function update(currentTime) {
            let progress = Math.min((currentTime - startTime) / duration, 1);
            fill.style.width = (progress * 100) + "%";
            if (progress < 1) { requestAnimationFrame(update); } 
            else {
                setTimeout(() => {
                    overlay.style.display = 'none';
                    if (currentMod < 3) { currentMod++; document.getElementById('current-gate-title').innerText = gateTitles[currentMod]; clearD(); } 
                    else { document.getElementById('main-terminal').style.display = 'none'; document.getElementById('secret-overlay').style.display = 'flex'; }
                }, 400);
            }
        }
        requestAnimationFrame(update);
    }

    function triggerSuccessEnd() { document.getElementById('secret-overlay').style.display = 'none'; document.getElementById('success-ending').style.display = 'flex'; }
    
    function triggerFloodTypewriter() { 
        document.getElementById('intro-screen').style.display = 'none'; 
        document.getElementById('no-death-screen').style.display = "block"; 
        setInterval(() => { 
            const word = warnings[Math.floor(Math.random() * warnings.length)];
            const fontSize = Math.floor(Math.random() * 26 + 14) + "px";
            document.getElementById('flood-content').innerHTML += `<span style="font-size:${fontSize}; margin-right:10px;">${word}</span> `; 
            window.scrollTo(0, document.body.scrollHeight);
        }, 30); 
    }

    // --- 核心修正：觸發死亡結局 ---
    function triggerDeathEnding() {
        document.getElementById('main-terminal').style.display = 'none';
        document.getElementById('death-ending').style.display = "block";
        const content = document.getElementById('death-content');
        setInterval(() => { 
            const fontSize = Math.floor(Math.random() * 32 + 16) + "px";
            const color = Math.random() > 0.5 ? "#f00" : "#800";
            content.innerHTML += `<span style="font-size:${fontSize}; color:${color}; margin-right:8px;">DEAD</span> `; 
            window.scrollTo(0, document.body.scrollHeight);
        }, 20);
    }
</script>
</body>
</html>
