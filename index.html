<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TERMINAL | ST. MARIA</title>

<style>
body{
    margin:0;
    background:#000;
    color:#900;
    font-family:"Noto Serif TC";
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.screen{display:none;}
.screen.active{display:block;}

.box{
    width:90%;
    max-width:700px;
    padding:20px;
    border:1px solid #700;
    background:rgba(10,0,0,0.95);
    color:#c33;
    line-height:1.8;
    font-size:14px;
}

.btn{
    margin-top:20px;
    padding:10px 25px;
    border:2px solid #f00;
    background:transparent;
    color:#f00;
    cursor:pointer;
}

.btn:active{transform:scale(.95);}

.keypad button{
    width:60px;
    height:60px;
    margin:5px;
    background:#200;
    color:#f33;
    border:1px solid #700;
    font-size:18px;
}

#display{
    font-size:30px;
    text-align:center;
    margin:15px 0;
    color:#f00;
}

#dead{
    position:fixed;
    inset:0;
    background:#000;
    color:#fff;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:80px;
    font-family:monospace;
    animation:flash .1s infinite;
}

@keyframes flash{
    0%{background:#000;}
    50%{background:#500;}
    100%{background:#000;}
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="fear" src="fear.mp3"></audio>
<audio id="static" src="static.mp3"></audio>
<audio id="death" src="death.mp3"></audio>
<audio id="beep" src="beep.mp3"></audio>
<audio id="ring" src="ring.mp3"></audio>

<!-- INTRO -->
<div id="s1" class="screen active">
<div class="box">
2✕✕✕年的深夜，一場大火抹去了Veil家族的所有痕跡。<br><br>
縱然所有資料皆顯示無人生還，但有位被隱藏在灰燼中的孩子，學會了如何服從規則。<br><br>
他在2✕✕✕年✕✕月12號被迫接受了新的罪名，加入了不屬於他的家族。<br><br>
被抹去的記憶，那段在深處的冰庫裡反鎖了整整四個小時的秘密。<br><br>
你確定要嘗試打開地下室上鎖的保險箱嗎？

<button class="btn" onclick="start()">YES</button>
<button class="btn" onclick="no()">NO</button>
</div>
</div>

<!-- GAME -->
<div id="s2" class="screen">
<div class="box">
STAGE 01<br>
<div id="display">-</div>

<div class="keypad">
<button onclick="input(1)">1</button>
<button onclick="input(2)">2</button>
<button onclick="input(3)">3</button>
<button onclick="input(4)">4</button>
<button onclick="input(5)">5</button>
<button onclick="input(6)">6</button>
<button onclick="input(7)">7</button>
<button onclick="input(8)">8</button>
<button onclick="input(9)">9</button>
<button onclick="clearI()">CLR</button>
<button onclick="input(0)">0</button>
<button onclick="check()">OK</button>
</div>
</div>
</div>

<!-- DEAD -->
<div id="dead">
NOW RUN.
</div>

<script>

let ans={1:"1",2:"4",3:"12"};
let stage=1;
let inputStr="";
let err=0;

function start(){
    document.getElementById("s1").classList.remove("active");
    document.getElementById("s2").classList.add("active");
}

function no(){
    play("ring",0.6);
    setTimeout(die,600);
}

function input(n){
    play("beep",0.2);
    inputStr+=n;
    document.getElementById("display").innerText=inputStr;
}

function clearI(){
    inputStr="";
    document.getElementById("display").innerText="-";
}

function check(){

    if(inputStr===ans[stage]){

        stage++;
        inputStr="";

        if(stage>3){
            win();
        }else{
            document.getElementById("display").innerText="OK";
        }

    }else{

        err++;

        play("beep",0.4);

        if(err===2){
            play("static",0.4);
            document.body.style.filter="contrast(2)";
            setTimeout(()=>document.body.style.filter="",150);
        }

        if(err>=3){
            die();
        }

        inputStr="";
        document.getElementById("display").innerText="ERR";
    }
}

function win(){
    alert("ACCESS GRANTED");
}

function die(){

    play("fear",0.8);

    setTimeout(()=>play("static",0.7),400);
    setTimeout(()=>play("death",0.9),900);

    document.body.style.animation="shake .1s infinite";

    let d=document.getElementById("dead");
    d.style.display="flex";

    let words=["VOID","RUN","WATCHING","HELP","ERROR"];

    let i=setInterval(()=>{
        let t=document.createElement("div");
        t.style.position="absolute";
        t.style.left=Math.random()*100+"%";
        t.style.top=Math.random()*100+"%";
        t.innerText=words[Math.floor(Math.random()*words.length)];
        d.appendChild(t);

        if(d.children.length>30){
            d.removeChild(d.children[0]);
        }
    },40);

    setTimeout(()=>{
        clearInterval(i);
        location.reload();
    },8000);
}

function play(id,v){
    let a=document.getElementById(id);
    if(!a) return;
    a.volume=v;
    a.currentTime=0;
    a.play().catch(()=>{});
}

</script>

</body>
</html>
